name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify release version
        run: node scripts/verify-release-version.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke extension
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run smoke:extension

      - name: Package
        run: npm run package

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/sealos-app-dev-bridge-${GITHUB_REF_NAME#v}.zip \
            release/sealos-app-dev-bridge-${GITHUB_REF_NAME#v}.zip.sha256 \
            --title "Sealos App Dev Bridge ${GITHUB_REF_NAME}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
