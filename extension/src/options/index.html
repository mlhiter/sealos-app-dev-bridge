<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Sealos App Dev Bridge Options</title>
  </head>
  <body>
    <main class="options-shell">
      <header class="page-header">
        <div>
          <h1>Sealos App Dev Bridge</h1>
          <p>Captured profiles, optional origin defaults, and recent SDK message metadata.</p>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </header>

      <section>
        <h2>Profiles</h2>
        <div id="profiles" class="list"></div>
      </section>

      <section>
        <h2>Origin Defaults</h2>
        <div id="origin-defaults" class="list"></div>
      </section>

      <section>
        <h2>Debug</h2>
        <div id="debug-log" class="list"></div>
      </section>
    </main>
    <script type="module" src="../assets/options.js"></script>
  </body>
</html>
