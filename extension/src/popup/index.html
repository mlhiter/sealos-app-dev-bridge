<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Sealos App Dev Bridge</title>
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>Sealos Bridge</h1>
          <p id="status" class="status-line">Loading</p>
        </div>
        <span id="tab-kind" class="status-pill">Unknown</span>
      </header>

      <section class="state-panel">
        <div class="panel-head">
          <span class="eyebrow">Current tab</span>
        </div>
        <code id="current-origin" class="tab-origin">No tab detected</code>
        <span id="profile-source" class="meta-line">No profile resolved</span>
      </section>

      <section class="control-group">
        <div class="field-head">
          <label class="eyebrow" for="profile-select">Profile</label>
          <span class="meta-line">Manual tab selection</span>
        </div>
        <select id="profile-select"></select>
        <div class="field-head compact">
          <label class="eyebrow" for="language-select">Language</label>
          <span class="meta-line">SDK getLanguage</span>
        </div>
        <select id="language-select"></select>
        <div id="selected-profile-details" class="profile-detail-block">No profile selected.</div>
        <button id="use-profile" class="primary-button" type="button">Use For This Tab</button>
      </section>

      <section class="capture-panel">
        <button id="capture-profile" class="secondary-button" type="button">Capture Desktop Tab</button>
        <p id="capture-note" class="meta-line">Open an authenticated Sealos Desktop tab before capturing.</p>
      </section>
    </main>
    <script type="module" src="../assets/popup.js"></script>
  </body>
</html>
