<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sealos Bridge Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #18201d;
        background: #f7f8f8;
      }

      main {
        display: grid;
        gap: 16px;
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      button {
        width: fit-content;
        border: 1px solid #0f7f68;
        border-radius: 6px;
        background: #0f7f68;
        color: #f7f8f8;
        padding: 8px 12px;
        font: inherit;
        font-weight: 650;
      }

      pre {
        min-height: 180px;
        border: 1px solid #c6d0cb;
        border-radius: 6px;
        background: #eef3f1;
        padding: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sealos Bridge Fixture</h1>
      <p>Use this localhost page after loading the extension and selecting a captured profile for the tab.</p>
      <button id="run" type="button">Send SDK Messages</button>
      <pre id="output">Waiting.</pre>
    </main>
    <script>
      const output = document.querySelector('#output');
      const apis = ['user.getInfo', 'getLanguage', 'getHostConfig', 'account.getWorkspaceQuota'];
      const pending = new Map();

      window.addEventListener('message', (event) => {
        if (event.source !== window) return;
        const message = event.data || {};
        if (!pending.has(message.messageId)) return;
        pending.get(message.messageId)(message);
        pending.delete(message.messageId);
      });

      document.querySelector('#run').addEventListener('click', async () => {
        output.textContent = 'Running...';
        const results = [];
        for (const apiName of apis) {
          results.push(await sendSdkMessage(apiName));
        }
        output.textContent = JSON.stringify(results, null, 2);
      });

      function sendSdkMessage(apiName) {
        const messageId = `${apiName}-${Date.now()}`;
        const request = {
          messageId,
          apiName,
          appKey: '',
          clientLocation: window.location.origin,
          success: false,
          data: {}
        };

        return new Promise((resolve) => {
          pending.set(messageId, resolve);
          window.top.postMessage(request, '*');
          setTimeout(() => {
            if (pending.has(messageId)) {
              pending.delete(messageId);
              resolve({ messageId, apiName, success: false, message: 'timeout' });
            }
          }, 5000);
        });
      }
    </script>
  </body>
</html>
